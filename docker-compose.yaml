services:
  # Database services
  asapp-authentication-postgres-db:
    image: 'postgres:17.7'
    container_name: asapp-authentication-postgres-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_DB=authenticationdb
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=secret
    volumes:
      - authentication-postgres-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d authenticationdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  asapp-tasks-postgres-db:
    image: 'postgres:17.7'
    container_name: asapp-tasks-postgres-db
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      - POSTGRES_DB=tasksdb
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=secret
    volumes:
      - tasks-postgres-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d tasksdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  asapp-users-postgres-db:
    image: 'postgres:17.7'
    container_name: asapp-users-postgres-db
    restart: unless-stopped
    ports:
      - '5434:5432'
    environment:
      - POSTGRES_DB=usersdb
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=secret
    volumes:
      - users-postgres-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d usersdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  asapp-redis:
    image: redis:8.4.0-alpine
    container_name: asapp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "secret"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a secret ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Tools
  asapp-prometheus:
    image: prom/prometheus:v3.8.0
    container_name: asapp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - prometheus-data:/prometheus
      - ./tools/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  asapp-grafana:
    image: grafana/grafana:12.3.1
    container_name: asapp-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=secret
    volumes:
      - grafana-data:/var/lib/grafana
      - ./tools/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./tools/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - asapp-prometheus

  # Services
  asapp-authentication-service:
    image: 'ghcr.io/attrigo/asapp-authentication-service:0.3.0-SNAPSHOT'
    container_name: asapp-authentication-service
    restart: on-failure:3
    ports:
      - '8080:8080'
      - '8090:8090'
    environment:
      - JAVA_OPTS=-Xmx256m -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/heap-dumps
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      - MANAGEMENT_PORT=8090
      - DB_HOST=asapp-authentication-postgres-db
      - DB_PORT=5432
      - DB_NAME=authenticationdb
      - DB_USERNAME=user
      - DB_PASSWORD=secret
      - REDIS_HOST=asapp-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=secret
      - CONFIG_URI=http://asapp-config-service:8888/asapp-config-service
      - CONFIG_USERNAME=config-user
      - CONFIG_PASSWORD=config-secret
      - DISCOVERY_URI=http://asapp-discovery-service:8761/asapp-discovery-service
      - MANAGEMENT_USERNAME=auth-user
      - MANAGEMENT_PASSWORD=auth-secret
      - ASAPP_SECURITY_JWT_SECRET=qPxa4PP692Q4fx6voNBX25WoQrzjCoLWLW3VnABjZaOImy0cQaTad5DqBZk3qPxi
      - ASAPP_SECURITY_ACCESS_TOKEN_EXPIRATION_TIME=300000
      - ASAPP_SECURITY_REFRESH_TOKEN_EXPIRATION_TIME=3600000
      - ASAPP_SECURITY_JWT_CLEANUP_ENABLED=true
      - ASAPP_SECURITY_JWT_CLEANUP_CRON_EXPRESSION=0 0 2 * * ?  # Daily at 2:00 AM
    volumes:
      - heap-dumps-data:/heap-dumps
    depends_on:
      asapp-authentication-postgres-db:
        condition: service_healthy
      asapp-config-service:
        condition: service_healthy
      asapp-discovery-service:
        condition: service_healthy
      asapp-redis:
        condition: service_healthy
  asapp-config-service:
    image: 'ghcr.io/attrigo/asapp-config-service:0.3.0-SNAPSHOT'
    container_name: asapp-config-service
    restart: on-failure:3
    ports:
      - '8888:8888'
      - '8898:8898'
    environment:
      - JAVA_OPTS=-Xmx256m -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/heap-dumps
      - SPRING_PROFILES_ACTIVE=native,docker
      - SERVER_PORT=8888
      - MANAGEMENT_PORT=8898
      - CONFIG_USERNAME=config-user
      - CONFIG_PASSWORD=config-secret
      - THC_PORT=8888
      - THC_PATH=/asapp-config-service/readyz
    volumes:
      - heap-dumps-data:/heap-dumps
      - ./central-config:/central-config:ro
    healthcheck:
      test: ["CMD", "/workspace/health-check"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
  asapp-discovery-service:
    image: 'ghcr.io/attrigo/asapp-discovery-service:0.3.0-SNAPSHOT'
    container_name: asapp-discovery-service
    restart: on-failure:3
    ports:
      - '8761:8761'
      - '8791:8791'
    environment:
      - JAVA_OPTS=-Xmx256m -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/heap-dumps
      - SPRING_PROFILES_ACTIVE=docker
      - DISCOVERY_URI=http://asapp-discovery-service:8761/asapp-discovery-service
      - SERVER_PORT=8761
      - MANAGEMENT_PORT=8791
      - MANAGEMENT_USERNAME=discovery-user
      - MANAGEMENT_PASSWORD=discovery-secret
      - THC_PORT=8791
      - THC_PATH=/asapp-discovery-service/readyz
    volumes:
      - heap-dumps-data:/heap-dumps
    healthcheck:
      test: ["CMD", "/workspace/health-check"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
  asapp-tasks-service:
    image: 'ghcr.io/attrigo/asapp-tasks-service:0.3.0-SNAPSHOT'
    container_name: asapp-tasks-service
    restart: on-failure:3
    ports:
      - '8081:8081'
      - '8091:8091'
    environment:
      - JAVA_OPTS=-Xmx256m -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/heap-dumps
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8081
      - MANAGEMENT_PORT=8091
      - DB_HOST=asapp-tasks-postgres-db
      - DB_PORT=5432
      - DB_NAME=tasksdb
      - DB_USERNAME=user
      - DB_PASSWORD=secret
      - REDIS_HOST=asapp-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=secret
      - CONFIG_URI=http://asapp-config-service:8888/asapp-config-service
      - CONFIG_USERNAME=config-user
      - CONFIG_PASSWORD=config-secret
      - DISCOVERY_URI=http://asapp-discovery-service:8761/asapp-discovery-service
      - MANAGEMENT_USERNAME=tasks-user
      - MANAGEMENT_PASSWORD=tasks-secret
      - ASAPP_SECURITY_JWT_SECRET=qPxa4PP692Q4fx6voNBX25WoQrzjCoLWLW3VnABjZaOImy0cQaTad5DqBZk3qPxi
    volumes:
      - heap-dumps-data:/heap-dumps
    depends_on:
      asapp-config-service:
        condition: service_healthy
      asapp-discovery-service:
        condition: service_healthy
      asapp-redis:
        condition: service_healthy
      asapp-tasks-postgres-db:
        condition: service_healthy
  asapp-users-service:
    image: 'ghcr.io/attrigo/asapp-users-service:0.3.0-SNAPSHOT'
    container_name: asapp-users-service
    restart: on-failure:3
    ports:
      - '8092:8092'
    environment:
      - JAVA_OPTS=-Xmx256m -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/heap-dumps
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8082
      - MANAGEMENT_PORT=8092
      - DB_HOST=asapp-users-postgres-db
      - DB_PORT=5432
      - DB_NAME=usersdb
      - DB_USERNAME=user
      - DB_PASSWORD=secret
      - REDIS_HOST=asapp-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=secret
      - CONFIG_URI=http://asapp-config-service:8888/asapp-config-service
      - CONFIG_USERNAME=config-user
      - CONFIG_PASSWORD=config-secret
      - DISCOVERY_URI=http://asapp-discovery-service:8761/asapp-discovery-service
      - MANAGEMENT_USERNAME=users-user
      - MANAGEMENT_PASSWORD=users-secret
      - ASAPP_SECURITY_JWT_SECRET=qPxa4PP692Q4fx6voNBX25WoQrzjCoLWLW3VnABjZaOImy0cQaTad5DqBZk3qPxi
      - ASAPP_CLIENT_TASKS_BASE_URL=http://asapp-tasks-service/asapp-tasks-service
    volumes:
      - heap-dumps-data:/heap-dumps
    depends_on:
      asapp-config-service:
        condition: service_healthy
      asapp-discovery-service:
        condition: service_healthy
      asapp-redis:
        condition: service_healthy
      asapp-users-postgres-db:
        condition: service_healthy

volumes:
  authentication-postgres-db-data:
  tasks-postgres-db-data:
  users-postgres-db-data:
  redis-data:
  grafana-data:
  prometheus-data:
  heap-dumps-data:

