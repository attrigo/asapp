# This workflow is triggered when a version tag matching v* is pushed (e.g. v0.3.0).
# It runs three sequential jobs:
#   1. build-and-test    — full build with tests, coverage, Javadoc, and style check
#   2. publish-docker    — builds and pushes versioned Docker images to ghcr.io
#   3. create-release    — generates changelog and creates the GitHub Release with JARs
#
# Permissions required:
#   - contents: write  — to create the GitHub Release
#   - packages: write  — to push Docker images to ghcr.io

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # Runs the full build profile
  # Uploads service JARs as an artifact for use by the create-release job.
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout the project
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test the project
        run: ./gradlew fullBuild

      - name: Upload service JARs
        uses: actions/upload-artifact@v6
        with:
          name: service-jars
          path: services/*/build/libs/*.jar
          retention-days: 1

  # Builds a versioned Docker image for every service (lib modules are skipped)
  # Pushes images to ghcr.io/attrigo/<service-name>:<version>.
  publish-docker:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout the project
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and push Docker images
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew bootBuildImage --publishImage

  # Downloads the service JARs built in build-and-test
  # Generates release notes from conventional commits using git-cliff
  # Publishes the GitHub Release.
  create-release:
    needs: [publish-docker]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout the project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download service JARs
        uses: actions/download-artifact@v7
        with:
          name: service-jars
          path: release-artifacts

      # --latest      : only includes commits reachable from the current tag back to the previous one
      # --strip header : removes the changelog file header, keeping only the entry body
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: .github/cliff.toml
          args: --verbose --latest --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md
          GITHUB_REPO: ${{ github.repository }}
      
      # GitHub automatically attaches two source code archives (.zip and .tar.gz)
      # The five runnable service JARs are attached explicitly.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file CHANGELOG_RELEASE.md \
            release-artifacts/*/build/libs/*.jar
