# This workflow is triggered when a version tag matching v* is pushed (e.g. v0.3.0).
# It runs three sequential jobs:
#   1. build-and-test    — full build with tests, coverage, Javadoc, and style check
#   2. publish-docker    — builds and pushes versioned Docker images to ghcr.io
#   3. create-release    — generates changelog and creates the GitHub Release with JARs
#
# Permissions required:
#   - contents: write  — to create the GitHub Release
#   - packages: write  — to push Docker images to ghcr.io

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout the project
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      # Runs the full build profile: unit + integration tests, JaCoCo coverage,
      # Javadoc, sources JARs, and Spotless style check.
      - name: Build and test the project
        run: mvn install -B --no-transfer-progress -Pfull

      # Uploads the four runnable service JARs so the create-release job can attach
      # them to the GitHub Release without rebuilding the project.
      - name: Upload service JARs
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: services/*/target/*.jar
          retention-days: 1

  publish-docker:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout the project
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builds and pushes a versioned Docker image for every module under services/.
      # Lib modules are automatically skipped.
      # Images are published to ghcr.io/attrigo/<service-name>:<version>.
      - name: Build and push Docker images
        run: |
          mvn spring-boot:build-image -B --no-transfer-progress -DskipTests

          for SERVICE_DIR in services/*/; do
            SERVICE=$(basename "$SERVICE_DIR")
            docker push "ghcr.io/attrigo/${SERVICE}:${{ steps.version.outputs.VERSION }}"
          done

  create-release:
    needs: [publish-docker]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout the project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download service JARs
        uses: actions/download-artifact@v4
        with:
          name: service-jars
          path: release-artifacts

      # Generates release notes from commits since the previous tag using git-cliff.
      # --latest   : only includes commits reachable from the current tag back to the previous one
      # --strip header : removes the changelog file header, keeping only the entry body
      # The output is written to CHANGELOG_RELEASE.md and used as the release description.
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: .github/cliff.toml
          args: --verbose --latest --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md
          GITHUB_REPO: ${{ github.repository }}

      # Creates the GitHub Release for the pushed tag.
      # GitHub automatically attaches two source code archives (.zip and .tar.gz).
      # In addition, the four runnable service JARs are explicitly attached.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file CHANGELOG_RELEASE.md \
            release-artifacts/services/*/target/*.jar