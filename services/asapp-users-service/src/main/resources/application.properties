# Spring Base Application properties
spring.application.name=asapp-users-service
# Spring Config properties
spring.cloud.config.password=secret
spring.config.import=configserver:${CONFIG_SERVER_URI:http://localhost:8888/asapp-config-service}
spring.cloud.config.username=user

# Server properties
server.port=8082
server.servlet.context-path=/asapp-users-service

# Security properties
spring.security.user.name=user
spring.security.user.password=secret

# Datasource properties
spring.datasource.password=secret
spring.datasource.url=jdbc:postgresql://localhost:5434/usersdb
spring.datasource.username=user

# Liquibase properties
spring.liquibase.change-log=liquibase/db/changelog/db.changelog-master.xml
spring.liquibase.password=${spring.datasource.password}
spring.liquibase.url=${spring.datasource.url}
spring.liquibase.user=${spring.datasource.username}

# Eureka properties
eureka.client.service-url.defaultZone=http://user:secret@localhost:8761/asapp-discovery-service/eureka
eureka.instance.health-check-url-path=${server.servlet.context-path}/actuator/health
eureka.instance.home-page-url-path=${server.servlet.context-path}
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=true
eureka.instance.status-page-url-path=${server.servlet.context-path}/actuator/info

# Management properties
management.health.circuitbreakers.enabled=true
management.server.base-path=${server.servlet.context-path}
management.server.port=8092

# Custom application properties
## Tasks service client properties
spring.http.serviceclient.tasks.base-url=http://asapp-tasks-service/asapp-tasks-service
## Tasks service client circuit breaker properties
resilience4j.circuitbreaker.instances.tasks.sliding-window-size=10
resilience4j.circuitbreaker.instances.tasks.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.tasks.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.tasks.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.tasks.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.tasks.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.tasks.register-health-indicator=true
resilience4j.circuitbreaker.instances.tasks.allow-health-indicator-to-fail=false
resilience4j.circuitbreaker.instances.tasks.ignore-exceptions=org.springframework.web.client.HttpClientErrorException
