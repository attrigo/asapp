# Spring Base Application properties
spring.application.name=asapp-users-service
spring.threads.virtual.enabled=true

# Config Client properties
spring.cloud.config.enabled=false

# Server properties
server.servlet.context-path=/asapp-users-service

# Security properties
spring.security.user.name=user
spring.security.user.password=secret

# Web MVC properties
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

# Jackson properties
spring.jackson.default-property-inclusion=NON_NULL

# Liquibase properties
spring.liquibase.change-log=liquibase/db/changelog/db.changelog-master.xml

# Management properties
management.endpoint.health.cache.time-to-live=30s
management.endpoint.health.probes.add-additional-paths=true
management.endpoint.health.show-details=when_authorized
management.endpoint.heapdump.access=unrestricted
management.endpoint.shutdown.access=unrestricted
management.endpoints.web.exposure.include=*
management.health.circuitbreakers.enabled=true
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
management.info.process.enabled=true
management.prometheus.metrics.export.enabled=true
management.server.base-path=${server.servlet.context-path}
management.server.port=0

# Eureka Client properties
eureka.client.enabled=false

# Load Balancer properties
spring.cloud.loadbalancer.enabled=false

# Resilience properties
## Circuit Breaker
resilience4j.circuitbreaker.circuit-breaker-aspect-order=2147483642
resilience4j.circuitbreaker.instances.tasks.sliding-window-size=10
resilience4j.circuitbreaker.instances.tasks.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.tasks.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.tasks.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.tasks.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.tasks.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.tasks.register-health-indicator=true
resilience4j.circuitbreaker.instances.tasks.allow-health-indicator-to-fail=false
resilience4j.circuitbreaker.instances.tasks.ignore-exceptions=org.springframework.web.client.HttpClientErrorException
## Retry
resilience4j.retry.retry-aspect-order=2147483643
resilience4j.retry.instances.tasks.max-attempts=1
resilience4j.retry.instances.tasks.wait-duration=10ms
resilience4j.retry.instances.tasks.retry-exceptions=org.springframework.web.client.ResourceAccessException,org.springframework.web.client.HttpServerErrorException

# Http Service Client properties
spring.http.clients.connect-timeout=1s
spring.http.clients.read-timeout=2s
spring.http.clients.redirects=dont-follow
spring.http.serviceclient.tasks.base-url=http://localhost:8081/asapp-tasks-service

# Logger properties
logging.level.com.attrigo.asapp.users=INFO
logging.level.org.springframework=INFO
logging.level.org.mockserver=WARN

# BootUI properties
bootui.enabled=OFF

