# Spring Base Application properties
spring.application.name=asapp-authentication-service
spring.threads.virtual.enabled=true

# Config Client properties
spring.cloud.config.enabled=false

# Server properties
server.servlet.context-path=/asapp-authentication-service

# Security properties
spring.security.user.name=user
spring.security.user.password=secret

# Web MVC properties
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

# Jackson properties
spring.jackson.default-property-inclusion=NON_NULL

# Liquibase properties
spring.liquibase.change-log=liquibase/db/changelog/db.changelog-master.xml

# Eureka properties
eureka.client.enabled=false

# Load balancer properties
spring.cloud.loadbalancer.enabled=false

# Management properties
management.endpoint.health.cache.time-to-live=30s
management.endpoint.health.probes.add-additional-paths=true
management.endpoint.health.show-details=when_authorized
management.endpoint.heapdump.access=unrestricted
management.endpoint.shutdown.access=unrestricted
management.endpoints.web.exposure.include=*
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
management.info.process.enabled=true
management.prometheus.metrics.export.enabled=true
management.server.base-path=${server.servlet.context-path}
management.server.port=0

# Logger properties
logging.level.com.bcn.asapp.authentication=INFO
logging.level.org.springframework=INFO

# Custom application properties
## Security properties
asapp.security.access-token.expiration-time=300000
