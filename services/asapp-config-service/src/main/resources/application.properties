# Spring Base Application properties
spring.application.name=asapp-config-service
spring.profiles.active=native
spring.devtools.livereload.enabled=true

# Server properties
server.port=8888
server.servlet.context-path=/asapp-config-service

# Security properties
spring.security.user.name=config-user
spring.security.user.password=config-secret

# Config Server properties
spring.cloud.config.server.native.searchLocations=file:///${user.dir}/central-config

# Management properties
management.endpoint.health.cache.time-to-live=30s
management.endpoint.health.probes.add-additional-paths=true
management.endpoint.health.show-details=when_authorized
management.endpoint.heapdump.access=unrestricted
management.endpoint.shutdown.access=unrestricted
management.endpoints.web.exposure.include=*
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
management.info.process.enabled=true
management.metrics.tags.application=${spring.application.name}
management.server.base-path=${server.servlet.context-path}
management.server.port=8898

# Logger properties
logging.level.com.bcn.asapp.config=INFO
logging.level.org.springframework=INFO
