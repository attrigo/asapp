# Spring Base Application properties
spring.application.name=asapp-discovery-service

# Server properties
server.port=${SERVER_PORT}
server.servlet.context-path=/asapp-discovery-service

# Security properties
spring.security.user.name=${SERVICE_USERNAME}
spring.security.user.password=${SERVICE_PASSWORD}

# Eureka server properties
eureka.client.fetch-registry=false
eureka.client.register-with-eureka=false
eureka.client.service-url.defaultZone=http://${DISCOVERY_USERNAME}:${DISCOVERY_PASSWORD}@${DISCOVERY_HOST}/eureka

# Management properties
management.endpoint.health.cache.time-to-live=30s
management.endpoint.health.probes.add-additional-paths=true
management.endpoint.health.show-details=when_authorized
management.info.java.enabled=true
management.info.os.enabled=true
management.info.process.enabled=true
management.metrics.tags.application=${spring.application.name}
management.server.base-path=${server.servlet.context-path}
management.server.port=${MANAGEMENT_PORT}

# Logger properties
logging.level.org.springframework=INFO
