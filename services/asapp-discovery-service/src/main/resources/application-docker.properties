# Spring Base Application properties
spring.application.name=asapp-discovery-service

# Server properties
server.port=${SERVER_PORT}
server.servlet.context-path=/asapp-discovery-service

# Security properties
spring.security.user.name=${MANAGEMENT_USERNAME}
spring.security.user.password=${MANAGEMENT_PASSWORD}

# Eureka server properties
eureka.client.fetch-registry=false
eureka.client.register-with-eureka=false
eureka.client.service-url.defaultZone=${DISCOVERY_URI}/eureka

# Management properties
management.endpoint.health.cache.time-to-live=30s
management.endpoint.health.probes.add-additional-paths=true
management.endpoint.health.show-details=when_authorized
management.endpoint.heapdump.access=unrestricted
management.endpoint.shutdown.access=unrestricted
management.endpoints.web.exposure.include=*
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
management.info.process.enabled=true
management.metrics.tags.application=${spring.application.name}
management.server.base-path=${server.servlet.context-path}
management.server.port=${MANAGEMENT_PORT}

# Logger properties
logging.level.com.bcn.asapp.discovery=INFO
logging.level.org.springframework=INFO
