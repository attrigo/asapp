# Shared configuration for all ASAPP services

# Spring Base Application properties
spring.threads.virtual.enabled=true

# Web MVC properties
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

# Jackson properties
spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE
spring.jackson.default-property-inclusion=NON_NULL

# Redis properties
spring.data.redis.host=localhost
spring.data.redis.password=secret
spring.data.redis.port=6379

# Management properties
management.endpoint.health.cache.time-to-live=30s
management.endpoint.health.probes.add-additional-paths=true
management.endpoint.health.show-details=when_authorized
management.endpoint.heapdump.access=none
management.endpoint.shutdown.access=none
management.endpoints.web.exposure.include=health,info,prometheus,sbom
management.info.env.enabled=false
management.info.java.enabled=true
management.info.os.enabled=true
management.info.process.enabled=true

# OpenAPI properties
springdoc.api-docs.enabled=false
springdoc.packages-to-scan=com.attrigo.asapp
springdoc.swagger-ui.enabled=false

