# --- Service bases (servlet context path = service name) ---
auth.scheme=http
auth.host=localhost
auth.port=8080
auth.context=/asapp-authentication-service
tasks.scheme=http
tasks.host=localhost
tasks.port=8081
tasks.context=/asapp-tasks-service
users.scheme=http
users.host=localhost
users.port=8082
users.context=/asapp-users-service

# --- Management ports (tooling-exposure plan) ---
auth.mgmt.port=8090
tasks.mgmt.port=8091
users.mgmt.port=8092

# --- Load knobs (stress plan) ---
threads=20
rampup=20
duration=300
loops=-1
users.per.pass.max=10
tasks.per.user.max=10

# --- Credentials (meets the 8-64 char password rule) ---
password=L0adT3st!Pass

# --- Management credentials (Actuator Basic auth; matches docker-compose SERVICE_USERNAME/PASSWORD) ---
mgmt.username=user
mgmt.password=secret

# --- Tooling-exposure plan: environment profile to assert (dev|prod); override with --profile ---
profile=dev
